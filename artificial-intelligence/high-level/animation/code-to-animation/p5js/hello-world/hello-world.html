<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body>

<script>
    function setup() {
      createCanvas(400, 300);
    }

    function draw() {
      background(0);
      fill(255);
      textSize(50);
      textAlign(CENTER, CENTER);
      text("Hello World", width/2, height/2 + sin(frameCount*0.1)*10);
    }
</script>

</body>
