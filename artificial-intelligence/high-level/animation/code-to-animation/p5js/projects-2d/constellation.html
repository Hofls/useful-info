<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constellation Flow - p5.js Generative Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 10;
        }

        .title {
            font-size: 18px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        .instruction {
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="overlay">
    <div class="title">CONSTELLATION FLOW</div>
    <div class="instruction">Move mouse to disturb • Click to regenerate</div>
</div>

<script>
    let particles = [];
    let numParticles = 80;
    let connectionDistance = 150;
    let mouseRepelRadius = 200;
    let colorOffset = 0;

    function setup() {
        let canvas = createCanvas(windowWidth, windowHeight);
        canvas.parent('canvas-container');

        // Initialize particles
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }

        background(10, 10, 15);
    }

    function draw() {
        // Semi-transparent background for trail effect
        fill(10, 10, 15, 30);
        noStroke();
        rect(0, 0, width, height);

        colorOffset += 0.5;

        // Update and display particles
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].display();

            // Draw connections
            for (let j = i + 1; j < particles.length; j++) {
                let d = dist(particles[i].pos.x, particles[i].pos.y,
                            particles[j].pos.x, particles[j].pos.y);

                if (d < connectionDistance) {
                    let alpha = map(d, 0, connectionDistance, 150, 0);
                    strokeWeight(0.5);

                    // Dynamic color based on distance and time
                    let hue1 = (particles[i].hue + colorOffset) % 360;
                    let hue2 = (particles[j].hue + colorOffset) % 360;

                    // Gradient line effect
                    stroke(hue1, 80, 90, alpha);
                    line(particles[i].pos.x, particles[i].pos.y,
                         particles[j].pos.x, particles[j].pos.y);
                }
            }
        }

        // Draw mouse glow
        if (mouseX > 0 && mouseX < width && mouseY > 0 && mouseY < height) {
            noStroke();
            for (let r = 50; r > 0; r -= 10) {
                let alpha = map(r, 0, 50, 100, 0);
                fill(200, 220, 255, alpha * 0.3);
                circle(mouseX, mouseY, r * 2);
            }
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }

    function mousePressed() {
        // Regenerate particles on click
        particles = [];
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
        }
        background(10, 10, 15);
    }

    class Particle {
        constructor() {
            this.pos = createVector(random(width), random(height));
            this.vel = createVector(random(-0.5, 0.5), random(-0.5, 0.5));
            this.acc = createVector(0, 0);
            this.size = random(3, 8);
            this.hue = random(0, 360);
            this.baseHue = this.hue;
            this.noiseOffset = createVector(random(1000), random(1000));
        }

        update() {
            // Perlin noise movement for organic flow
            let angle = noise(this.noiseOffset.x, this.noiseOffset.y) * TWO_PI * 2;
            let force = p5.Vector.fromAngle(angle);
            force.mult(0.1);
            this.acc.add(force);

            // Mouse repulsion
            let mousePos = createVector(mouseX, mouseY);
            let d = dist(this.pos.x, this.pos.y, mousePos.x, mousePos.y);

            if (d < mouseRepelRadius && mouseX > 0) {
                let repel = p5.Vector.sub(this.pos, mousePos);
                repel.normalize();
                repel.mult(map(d, 0, mouseRepelRadius, 2, 0));
                this.acc.add(repel);
            }

            // Apply physics
            this.vel.add(this.acc);
            this.vel.limit(2);
            this.pos.add(this.vel);
            this.acc.mult(0);

            // Noise evolution
            this.noiseOffset.add(0.01, 0.01);

            // Wrap around edges
            if (this.pos.x < -50) this.pos.x = width + 50;
            if (this.pos.x > width + 50) this.pos.x = -50;
            if (this.pos.y < -50) this.pos.y = height + 50;
            if (this.pos.y > height + 50) this.pos.y = -50;

            // Update hue
            this.hue = (this.baseHue + colorOffset * 0.5) % 360;
        }

        display() {
            noStroke();

            // Outer glow
            for (let r = this.size * 3; r > 0; r -= 2) {
                let alpha = map(r, 0, this.size * 3, 200, 0);
                fill(this.hue, 70, 100, alpha * 0.3);
                circle(this.pos.x, this.pos.y, r);
            }

            // Core
            fill(this.hue, 40, 100, 255);
            circle(this.pos.x, this.pos.y, this.size);
        }
    }
</script>
</body>
</html>
