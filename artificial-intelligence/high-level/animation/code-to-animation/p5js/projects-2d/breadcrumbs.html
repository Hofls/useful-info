<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Dynamic Art with p5.js</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        body {
          margin: 0;
          padding: 0;
          overflow: hidden;
          background: #000;
        }
        canvas {
          display: block;
        }
    </style>
</head>
<body>
<script>
    let trails = [];
    const maxTrails = 100;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 1);
      background(0, 0, 10, 0.05);
    }

    function draw() {
      // Плавное затухание фона (создаёт эффект следа)
      background(0, 0, 10, 0.05);

      // Создаём новую точку следа
      let newTrail = {
        x: mouseX,
        y: mouseY,
        size: random(2, 8),
        hue: frameCount % 360,
        alpha: 0.8
      };
      trails.push(newTrail);

      // Ограничиваем количество следов
      if (trails.length > maxTrails) {
        trails.shift();
      }

      // Рисуем все следы
      for (let i = 0; i < trails.length; i++) {
        let t = trails[i];
        noStroke();
        fill(t.hue, 80, 100, t.alpha);
        ellipse(t.x, t.y, t.size, t.size);

        // Постепенно уменьшаем прозрачность старых следов
        t.alpha *= 0.98;
        t.size += 0.2;
      }
    }

    // Обновляем размер холста при изменении размера окна
    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
