<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P5.js Shader Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
    // --- Vertex Shader ---
    // This handles the positioning of our "plane" for the shader to draw on.
    const vs = `
        precision highp float;
        attribute vec3 aPosition;
        void main() {
            gl_Position = vec4(aPosition, 1.0);
        }
    `;

    // --- Fragment Shader ---
    // This is where the magic happens.
    const fs = `
        precision highp float;
        uniform vec2 u_resolution;
        uniform float u_time;

        // Helper to create color gradients
        vec3 palette(float t) {
            vec3 a = vec3(0.5, 0.5, 0.5);
            vec3 b = vec3(0.5, 0.5, 0.5);
            vec3 c = vec3(1.0, 1.0, 1.0);
            vec3 d = vec3(0.263, 0.416, 0.557);
            return a + b * cos(6.28318 * (c * t + d));
        }

        void main() {
            // Normalize pixel coordinates (from -1 to 1)
            vec2 uv = (gl_FragCoord.xy * 2.0 - u_resolution.xy) / min(u_resolution.y, u_resolution.x);
            vec2 uv0 = uv;
            vec3 finalColor = vec3(0.0);

            // Fractal iteration
            for (float i = 0.0; i < 4.0; i++) {
                uv = fract(uv * 1.5) - 0.5;

                float d = length(uv) * exp(-length(uv0));
                vec3 col = palette(length(uv0) + i*.4 + u_time*.4);

                d = sin(d * 8.0 + u_time) / 8.0;
                d = abs(d);
                d = pow(0.01 / d, 1.2);

                finalColor += col * d;
            }

            gl_FragColor = vec4(finalColor, 1.0);
        }
    `;

    let artShader;

    function setup() {
        // Shaders require WEBGL mode
        createCanvas(windowWidth, windowHeight, WEBGL);
        noStroke();

        // Create the shader object
        artShader = createShader(vs, fs);
    }

    function draw() {
        background(0);

        // Activate the shader
        shader(artShader);

        // Pass variables (uniforms) from JS to the Shader
        artShader.setUniform('u_resolution', [width, height]);
        artShader.setUniform('u_time', millis() / 1000.0);

        // Draw a rectangle that covers the entire screen to display the shader
        rect(0, 0, width, height);
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
