<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dreams - p5.js Shader Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div id="info">Move mouse to shift perspective • Click to change color palette</div>

<script>
    let myShader;
    let colorMode = 0;

    // Vertex shader - passes through position and UV coordinates
    const vertShader = `
        attribute vec3 aPosition;
        attribute vec2 aTexCoord;
        varying vec2 vTexCoord;

        void main() {
            vTexCoord = aTexCoord;
            vec4 positionVec4 = vec4(aPosition, 1.0);
            positionVec4.xy = positionVec4.xy * 2.0 - 1.0;
            gl_Position = positionVec4;
        }
    `;

    // Fragment shader - creates beautiful ray-marched organic forms
    const fragShader = `
        precision highp float;
        varying vec2 vTexCoord;

        uniform vec2 uResolution;
        uniform float uTime;
        uniform vec2 uMouse;
        uniform float uColorMode;

        // Noise functions
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

        float snoise(vec3 v) {
            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);

            vec3 i  = floor(v + dot(v, C.yyy));
            vec3 x0 = v - i + dot(i, C.xxx);

            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min(g.xyz, l.zxy);
            vec3 i2 = max(g.xyz, l.zxy);

            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + C.yyy;
            vec3 x3 = x0 - D.yyy;

            i = mod289(i);
            vec4 p = permute(permute(permute(
                i.z + vec4(0.0, i1.z, i2.z, 1.0))
                + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                + i.x + vec4(0.0, i1.x, i2.x, 1.0));

            float n_ = 0.142857142857;
            vec3 ns = n_ * D.wyz - D.xzx;

            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);

            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_);

            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);

            vec4 b0 = vec4(x.xy, y.xy);
            vec4 b1 = vec4(x.zw, y.zw);

            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));

            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;

            vec3 p0 = vec3(a0.xy, h.x);
            vec3 p1 = vec3(a0.zw, h.y);
            vec3 p2 = vec3(a1.xy, h.z);
            vec3 p3 = vec3(a1.zw, h.w);

            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
            p0 *= norm.x;
            p1 *= norm.y;
            p2 *= norm.z;
            p3 *= norm.w;

            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }

        // Rotation matrix
        mat2 rotate(float angle) {
            float s = sin(angle);
            float c = cos(angle);
            return mat2(c, -s, s, c);
        }

        // Smooth minimum for organic blending
        float smin(float a, float b, float k) {
            float h = clamp(0.5 + 0.5 * (b - a) / k, 0.0, 1.0);
            return mix(b, a, h) - k * h * (1.0 - h);
        }

        // Distance to sphere
        float sdSphere(vec3 p, float r) {
            return length(p) - r;
        }

        // Distance to torus
        float sdTorus(vec3 p, vec2 t) {
            vec2 q = vec2(length(p.xz) - t.x, p.y);
            return length(q) - t.y;
        }

        // Distance to box
        float sdBox(vec3 p, vec3 b) {
            vec3 d = abs(p) - b;
            return min(max(d.x, max(d.y, d.z)), 0.0) + length(max(d, 0.0));
        }

        // The scene distance function
        float map(vec3 p) {
            // Animate the space
            float t = uTime * 0.3;

            // Create flowing motion
            vec3 q = p;
            q.y += t * 0.5;

            // Domain repetition with offset
            vec3 cell = vec3(4.0, 3.0, 4.0);
            vec3 id = floor(q / cell);
            vec3 r = mod(q, cell) - cell * 0.5;

            // Add noise displacement
            float n = snoise(p * 0.5 + t * 0.2) * 0.3;

            // Create organic blob shapes
            float d1 = sdSphere(r + vec3(sin(t + id.x) * 0.5, cos(t * 0.7 + id.y) * 0.3, 0.0), 0.8 + n * 0.3);

            // Add torus rings that rotate
            vec3 torusP = r;
            torusP.xz = rotate(t + id.x * 0.5) * torusP.xz;
            float d2 = sdTorus(torusP, vec2(1.2, 0.25));

            // Blend shapes smoothly
            float d = smin(d1, d2, 0.5);

            // Add smaller detail spheres
            vec3 detailP = r;
            detailP.y += sin(t * 2.0 + id.x) * 0.2;
            float d3 = sdSphere(detailP + vec3(0.8, 0.0, 0.0), 0.3);
            d = smin(d, d3, 0.3);

            // Ground plane with waves
            float ground = p.y + 2.0 + sin(p.x * 0.5 + t) * 0.3 + cos(p.z * 0.3 + t * 0.5) * 0.3;

            return min(d, ground * 0.5);
        }

        // Calculate normal for lighting
        vec3 calcNormal(vec3 p) {
            float eps = 0.001;
            return normalize(vec3(
                map(p + vec3(eps, 0.0, 0.0)) - map(p - vec3(eps, 0.0, 0.0)),
                map(p + vec3(0.0, eps, 0.0)) - map(p - vec3(0.0, eps, 0.0)),
                map(p + vec3(0.0, 0.0, eps)) - map(p - vec3(0.0, 0.0, eps))
            ));
        }

        // Color palette function
        vec3 palette(float t, float mode) {
            if (mode < 0.5) {
                // Sunset palette - warm oranges and purples
                vec3 a = vec3(0.5, 0.5, 0.5);
                vec3 b = vec3(0.5, 0.5, 0.5);
                vec3 c = vec3(1.0, 1.0, 1.0);
                vec3 d = vec3(0.263, 0.416, 0.557);
                return a + b * cos(6.28318 * (c * t + d));
            } else if (mode < 1.5) {
                // Neon cyberpunk - cyan and magenta
                vec3 a = vec3(0.5);
                vec3 b = vec3(0.5);
                vec3 c = vec3(1.0);
                vec3 d = vec3(0.00, 0.33, 0.67);
                return a + b * cos(6.28318 * (c * t + d + vec3(0.0, 0.5, 0.0)));
            } else {
                // Electric plasma - greens and blues
                vec3 a = vec3(0.8, 0.5, 0.4);
                vec3 b = vec3(0.2, 0.4, 0.2);
                vec3 c = vec3(2.0, 1.0, 1.0);
                vec3 d = vec3(0.00, 0.25, 0.25);
                return a + b * cos(6.28318 * (c * t + d));
            }
        }

        void main() {
            // Normalize coordinates
            vec2 uv = (vTexCoord - 0.5) * 2.0;
            uv.x *= uResolution.x / uResolution.y;

            // Mouse influence on camera
            vec2 mouse = (uMouse - 0.5) * 2.0;
            mouse.x *= uResolution.x / uResolution.y;

            // Camera setup
            float t = uTime * 0.2;
            vec3 ro = vec3(
                sin(t + mouse.x * 2.0) * 6.0,
                2.0 + mouse.y * 2.0,
                cos(t + mouse.x * 2.0) * 6.0
            );
            vec3 lookAt = vec3(0.0, 0.0, 0.0);

            // Camera matrix
            vec3 cw = normalize(lookAt - ro);
            vec3 cu = normalize(cross(cw, vec3(0.0, 1.0, 0.0)));
            vec3 cv = cross(cu, cw);

            // Ray direction
            vec3 rd = normalize(uv.x * cu + uv.y * cv + 1.5 * cw);

            // Ray marching
            float dO = 0.0;
            float dS = 0.0;
            vec3 p = ro;
            float glow = 0.0;
            vec3 col = vec3(0.0);

            for (int i = 0; i < 100; i++) {
                p = ro + rd * dO;
                dS = map(p);

                // Accumulate glow
                glow += 0.01 / (0.05 + dS * dS);

                if (dS < 0.001 || dO > 50.0) break;
                dO += dS * 0.5;
            }

            // Coloring
            if (dO < 50.0) {
                // Hit something - calculate lighting
                vec3 n = calcNormal(p);
                vec3 lightDir = normalize(vec3(1.0, 2.0, -1.0));

                // Diffuse lighting
                float diff = max(dot(n, lightDir), 0.0);

                // Specular
                vec3 viewDir = normalize(ro - p);
                vec3 reflectDir = reflect(-lightDir, n);
                float spec = pow(max(dot(viewDir, reflectDir), 0.0), 32.0);

                // Fresnel
                float fresnel = pow(1.0 - abs(dot(n, viewDir)), 3.0);

                // Base color from position and time
                float colorT = length(p) * 0.1 + uTime * 0.1;
                vec3 baseColor = palette(colorT, uColorMode);

                // Combine lighting
                col = baseColor * (diff * 0.8 + 0.2) + vec3(spec) * 0.5 + baseColor * fresnel * 0.5;

                // Ambient occlusion approximation
                float ao = 1.0 - smoothstep(0.0, 10.0, dO);
                col *= ao;
            } else {
                // Background - use glow from ray marching
                vec3 glowColor = palette(uTime * 0.05, uColorMode);
                col = glowColor * glow * 0.03;

                // Add some stars
                float stars = snoise(rd * 50.0 + uTime * 0.01);
                if (stars > 0.98) col += vec3(1.0) * stars;
            }

            // Fog
            float fog = 1.0 - exp(-dO * 0.05);
            vec3 fogColor = palette(uTime * 0.02, uColorMode) * 0.2;
            col = mix(col, fogColor, fog * 0.6);

            // Tone mapping
            col = col / (1.0 + col);

            // Gamma correction
            col = pow(col, vec3(0.4545));

            // Vignette
            float vignette = 1.0 - length(vTexCoord - 0.5) * 0.8;
            col *= vignette;

            gl_FragColor = vec4(col, 1.0);
        }
    `;

    function setup() {
        createCanvas(windowWidth, windowHeight, WEBGL);
        myShader = createShader(vertShader, fragShader);
        noStroke();
    }

    function draw() {
        shader(myShader);

        // Update uniforms
        myShader.setUniform('uResolution', [width, height]);
        myShader.setUniform('uTime', millis() / 1000.0);
        myShader.setUniform('uMouse', [mouseX / width, 1.0 - mouseY / height]);
        myShader.setUniform('uColorMode', colorMode);

        // Draw full screen quad
        plane(width, height);
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }

    function mousePressed() {
        colorMode = (colorMode + 1) % 3;
    }

    function keyPressed() {
        if (key === ' ') {
            colorMode = (colorMode + 1) % 3;
        }
    }
</script>
</body>
</html>
