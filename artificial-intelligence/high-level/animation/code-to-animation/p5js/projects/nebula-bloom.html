<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Nebula Bloom</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
    /* * Ethereal Flow Field
  * A generative art piece using Perlin Noise
  */

 let particles = [];
 const numParticles = 800; // Increase for more density
 const noiseScale = 0.01;

 function setup() {
   createCanvas(windowWidth, windowHeight);
   background(10, 15, 25); // Deep midnight blue

   // Initialize particles with random positions
   for (let i = 0; i < numParticles; i++) {
     particles.push(new Particle());
   }
 }

 function draw() {
   // Semi-transparent background creates the "trail" effect
   // Lower the alpha (4th value) for longer, smoother trails
   background(10, 15, 25, 5);

   for (let p of particles) {
     p.move();
     p.display();
     p.checkEdges();
   }
 }

 class Particle {
   constructor() {
     this.pos = createVector(random(width), random(height));
     this.vel = createVector(0, 0);
     this.acc = createVector(0, 0);
     this.speed = random(1, 3);

     // Aesthetic: Pick a color from a neon/pastel palette
     let colors = [
       color(0, 255, 200, 50),   // Cyan
       color(150, 50, 255, 50),  // Purple
       color(255, 0, 150, 50),   // Pink
       color(255, 255, 255, 30)  // Ghostly White
     ];
     this.color = random(colors);
   }

   move() {
     // Generate an angle based on Perlin noise
     let angle = noise(this.pos.x * noiseScale, this.pos.y * noiseScale) * TWO_PI * 4;
     this.acc = p5.Vector.fromAngle(angle);

     this.vel.add(this.acc);
     this.vel.limit(this.speed);
     this.pos.add(this.vel);
   }

   display() {
     stroke(this.color);
     strokeWeight(1.5);
     point(this.pos.x, this.pos.y);
   }

   checkEdges() {
     if (this.pos.x < 0) this.pos.x = width;
     if (this.pos.x > width) this.pos.x = 0;
     if (this.pos.y < 0) this.pos.y = height;
     if (this.pos.y > height) this.pos.y = 0;
   }
 }

 function windowResized() {
   resizeCanvas(windowWidth, windowHeight);
   background(10, 15, 25);
 }
</script>

</body>
</html>
