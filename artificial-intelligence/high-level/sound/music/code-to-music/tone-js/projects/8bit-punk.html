    // Initialize synths
    let guitarSynth, bassSynth, drumSynths, hihatSynth;

    function initSynths() {
        // 8-bit guitar - square wave for that chiptune punk sound
        guitarSynth = new Tone.PolySynth(Tone.Synth, {
            oscillator: {
                type: "square"
            },
            envelope: {
                attack: 0.01,
                decay: 0.1,
                sustain: 0.1,
                release: 0.1
            },
            volume: -8
        }).toDestination();

        // Bass - sawtooth for punch
        bassSynth = new Tone.Synth({
            oscillator: {
                type: "sawtooth"
            },
            envelope: {
                attack: 0.01,
                decay: 0.2,
                sustain: 0.3,
                release: 0.2
            },
            volume: -5
        }).toDestination();

        // Drum synths
        drumSynths = {
            kick: new Tone.MembraneSynth({
                pitchDecay: 0.05,
                octaves: 10,
                oscillator: { type: "sine" },
                envelope: {
                    attack: 0.001,
                    decay: 0.4,
                    sustain: 0.01,
                    release: 1.4
                },
                volume: 0
            }).toDestination(),

            snare: new Tone.NoiseSynth({
                noise: { type: "white" },
                envelope: {
                    attack: 0.001,
                    decay: 0.2,
                    sustain: 0
                },
                volume: -5
            }).toDestination(),

            crash: new Tone.NoiseSynth({
                noise: { type: "white" },
                envelope: {
                    attack: 0.01,
                    decay: 1,
                    sustain: 0
                },
                volume: -3
            }).toDestination()
        };

        // Hi-hat using metal synth
        hihatSynth = new Tone.MetalSynth({
            frequency: 200,
            envelope: {
                attack: 0.001,
                decay: 0.1,
                release: 0.01
            },
            harmonicity: 5.1,
            modulationIndex: 32,
            resonance: 4000,
            octaves: 1.5,
            volume: -12
        }).toDestination();
    }

    // Create parts
    let guitarPart, bassPart, drumPart;

        // Guitar part
        guitarPart = new Tone.Part((time, value) => {
            guitarSynth.triggerAttackRelease(value.note, value.dur, time);
        }, song.guitarPart);
        guitarPart.loop = false;

        // Bass part
        bassPart = new Tone.Part((time, value) => {
            bassSynth.triggerAttackRelease(value.note, value.dur, time);
        }, song.bassPart);
        bassPart.loop = false;

        // Drum part
        drumPart = new Tone.Part((time, value) => {
            if (value.drum === "kick") {
                drumSynths.kick.triggerAttackRelease("C1", "8n", time);
            } else if (value.drum === "snare") {
                drumSynths.snare.triggerAttackRelease("8n", time);
            } else if (value.drum === "hihat") {
                hihatSynth.triggerAttackRelease("32n", time, 0.3);
            } else if (value.drum === "crash") {
                drumSynths.crash.triggerAttackRelease("1n", time);
            }
        }, song.drumPart);
        drumPart.loop = false;
    }

    async function playSong() {
        if (isPlaying) return;

        await Tone.start();

        if (!guitarSynth) {
            initSynths();
            createParts();
        }

        isPlaying = true;
        playBtn.textContent = "PLAYING...";
        playBtn.disabled = true;
        status.style.opacity = "1";

        Tone.Transport.bpm.value = song.bpm;
        Tone.Transport.stop();
        Tone.Transport.position = 0;
        Tone.Transport.start();

        guitarPart.start(0);
        bassPart.start(0);
        drumPart.start(0);

        // Song duration ~22 seconds
        setTimeout(() => {
            isPlaying = false;
            playBtn.textContent = "PLAY";
            playBtn.disabled = false;
            status.style.opacity = "0";
            Tone.Transport.stop();
        }, 22000);
    }

    playBtn.addEventListener('click', playSong);
</script>
</body>
</html>
