<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="800" height="800" fill="#0e0e11"/>

    <!-- Central circle -->
    <circle cx="400" cy="400" r="180" fill="none" stroke="#ffffff" stroke-width="2"/>

    <!-- Diagonal lines -->
    <line x1="0" y1="0" x2="800" y2="800" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <line x1="800" y1="0" x2="0" y2="800" stroke="#ffffff" stroke-width="1" opacity="0.2"/>

    <!-- Orbiting circles -->
    <circle cx="400" cy="200" r="6" fill="#ffffff"/>
    <circle cx="600" cy="400" r="6" fill="#ffffff"/>
    <circle cx="400" cy="600" r="6" fill="#ffffff"/>
    <circle cx="200" cy="400" r="6" fill="#ffffff"/>

    <!-- Inner geometry -->
    <polygon points="400,260 540,540 260,540" fill="none" stroke="#ffffff" stroke-width="1.5"/>

    <!-- Subtle arcs -->
    <path d="M200 400 A200 200 0 0 1 600 400" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    <path d="M250 400 A150 150 0 0 0 550 400" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

    <!-- Center point -->
    <circle cx="400" cy="400" r="4" fill="#ffffff"/>
</svg>