<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artistic Abstract Landscape</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a0a;
        }
    </style>
</head>
<body>
    <script>
        function setup() {
            createCanvas(windowWidth, windowHeight);
            noLoop();
            drawArtisticLandscape();
        }

        function drawArtisticLandscape() {
            // Gradient background - deep blues to purples
            for (let y = 0; y < height; y++) {
                let inter = map(y, 0, height, 0, 1);
                let c = lerpColor(color(15, 25, 60), color(40, 15, 55), inter);
                stroke(c);
                line(0, y, width, y);
            }

            // Abstract mountains with geometric shapes
            noStroke();
            
            // Back layer - dark mountains
            fill(20, 30, 50, 200);
            beginShape();
            vertex(0, height * 0.6);
            vertex(width * 0.15, height * 0.45);
            vertex(width * 0.35, height * 0.55);
            vertex(width * 0.5, height * 0.35);
            vertex(width * 0.7, height * 0.5);
            vertex(width, height * 0.4);
            vertex(width, height);
            vertex(0, height);
            endShape(CLOSE);

            // Mid layer - purple mountains
            fill(80, 40, 100, 180);
            beginShape();
            vertex(0, height * 0.65);
            vertex(width * 0.2, height * 0.5);
            vertex(width * 0.4, height * 0.6);
            vertex(width * 0.6, height * 0.45);
            vertex(width * 0.8, height * 0.55);
            vertex(width, height * 0.5);
            vertex(width, height);
            vertex(0, height);
            endShape(CLOSE);

            // Front layer - vibrant abstract shapes
            fill(120, 80, 180, 190);
            beginShape();
            vertex(0, height * 0.7);
            vertex(width * 0.25, height * 0.55);
            vertex(width * 0.45, height * 0.65);
            vertex(width * 0.65, height * 0.5);
            vertex(width * 0.85, height * 0.6);
            vertex(width, height * 0.55);
            vertex(width, height);
            vertex(0, height);
            endShape(CLOSE);

            // Geometric accent shapes
            fill(200, 150, 255, 150);
            circle(width * 0.25, height * 0.4, 120);
            circle(width * 0.75, height * 0.35, 100);

            // Stylized sun/moon - semi-transparent circle with glow effect
            fill(255, 200, 100, 80);
            circle(width * 0.85, height * 0.25, 200);
            fill(255, 180, 60, 120);
            circle(width * 0.85, height * 0.25, 140);
            fill(255, 220, 150, 150);
            circle(width * 0.85, height * 0.25, 80);

            // Abstract floating shapes - dots and circles
            fill(200, 100, 255, 100);
            for (let i = 0; i < 15; i++) {
                let x = random(width);
                let y = random(height * 0.3);
                let size = random(10, 50);
                circle(x, y, size);
            }

            // Fine line work - artistic details
            stroke(200, 150, 255, 80);
            strokeWeight(2);
            noFill();
            
            // Curved lines across the composition
            beginShape();
            curveVertex(0, height * 0.5);
            curveVertex(width * 0.2, height * 0.45);
            curveVertex(width * 0.5, height * 0.55);
            curveVertex(width * 0.8, height * 0.4);
            curveVertex(width, height * 0.5);
            endShape();

            // Additional organic curves
            stroke(100, 200, 255, 60);
            strokeWeight(1.5);
            beginShape();
            curveVertex(0, height * 0.6);
            curveVertex(width * 0.3, height * 0.52);
            curveVertex(width * 0.7, height * 0.65);
            curveVertex(width, height * 0.55);
            endShape();

            // Horizontal accent lines - subtle layering effect
            stroke(200, 180, 255, 40);
            strokeWeight(1);
            for (let i = 0; i < 8; i++) {
                let y = height * 0.3 + i * height * 0.08;
                line(0, y, width, y);
            }

            // Vertical accent lines on right side
            stroke(150, 100, 200, 50);
            for (let i = 0; i < 6; i++) {
                let x = width * 0.7 + i * width * 0.04;
                line(x, height * 0.2, x, height * 0.8);
            }

            // Semi-transparent vignette effect
            noStroke();
            fill(0, 0, 0, 80);
            rect(0, 0, width, height);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            drawArtisticLandscape();
        }
    </script>
</body>
</html>
