<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Viewer</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; borderRadius: 8px; color: white; z-index: 10; }
        textarea { width: 250px; height: 150px; font-family: monospace; display: block; margin-bottom: 10px; }
        button { width: 100%; padding: 8px; cursor: pointer; background: #28a745; color: white; border: none; font-weight: bold; }
        button:hover { background: #218838; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui">
        <h3>Paste Voxel JSON:</h3>
        <textarea id="voxelInput" placeholder="[{'x':0, 'y':0, 'z':0, 'color':'#ff0000'}]"></textarea>
        <button onclick="renderVoxels()">Render</button>
    </div>

    <script>
        // 1. Setup Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 15, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Add Controls & Lights
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(3, 2, 3); // Point camera at the center
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // Grid helper for reference
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        // Group to hold our current voxels
        let voxelGroup = new THREE.Group();
        scene.add(voxelGroup);

        // 3. Shared Geometry & Material Cache to keep it efficient
        const geometry = new THREE.BoxGeometry(0.95, 0.95, 0.95); // Slightly less than 1 to see gaps
        const materialCache = {};

        // 4. Render Function
        function renderVoxels() {
            // Clear old voxels
            while(voxelGroup.children.length > 0){ 
                voxelGroup.remove(voxelGroup.children[0]); 
            }

            try {
                const rawData = document.getElementById('voxelInput').value;
                const voxels = JSON.parse(rawData);

                voxels.forEach(v => {
                    // Reuse materials so we don't crash the browser
                    if (!materialCache[v.color]) {
                        materialCache[v.color] = new THREE.MeshStandardMaterial({ color: v.color });
                    }
                    
                    const mesh = new THREE.Mesh(geometry, materialCache[v.color]);
                    mesh.position.set(v.x, v.y, v.z);
                    voxelGroup.add(mesh);
                });
            } catch (e) {
                alert("Invalid JSON format! Check your syntax.");
            }
        }

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
