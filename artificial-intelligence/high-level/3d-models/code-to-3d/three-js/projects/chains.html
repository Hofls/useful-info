<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 3D Scene</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>

</head>
<body>
<div id="info">Click and drag to rotate | Scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // Camera
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Create geometric shapes
    const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
    const material = new THREE.MeshPhongMaterial({
        color: 0x00d4ff,
        shininess: 100,
        specular: 0x444444
    });
    const torusKnot = new THREE.Mesh(geometry, material);
    scene.add(torusKnot);

    // Add orbiting spheres
    const spheres = [];
    for (let i = 0; i < 5; i++) {
        const sphereGeo = new THREE.SphereGeometry(0.2, 32, 32);
        const sphereMat = new THREE.MeshPhongMaterial({
            color: new THREE.Color().setHSL(i / 5, 1, 0.5)
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.orbitRadius = 2 + i * 0.3;
        sphere.orbitSpeed = 0.02 - i * 0.003;
        sphere.angle = (i / 5) * Math.PI * 2;
        spheres.push(sphere);
        scene.add(sphere);
    }

    // Lights
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1, 100);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    const pointLight2 = new THREE.PointLight(0xff6b6b, 0.5, 100);
    pointLight2.position.set(-5, -5, 5);
    scene.add(pointLight2);

    // Mouse interaction
    let mouseX = 0, mouseY = 0;
    let targetRotationX = 0, targetRotationY = 0;

    document.addEventListener('mousemove', (event) => {
        mouseX = (event.clientX - window.innerWidth / 2) * 0.001;
        mouseY = (event.clientY - window.innerHeight / 2) * 0.001;
    });

    // Zoom with scroll
    document.addEventListener('wheel', (event) => {
        camera.position.z += event.deltaY * 0.01;
        camera.position.z = Math.max(2, Math.min(10, camera.position.z));
    });

    // Handle window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation loop
    function animate() {
        requestAnimationFrame(animate);

        // Rotate main object
        torusKnot.rotation.x += 0.005;
        torusKnot.rotation.y += 0.01;

        // Animate orbiting spheres
        spheres.forEach(sphere => {
            sphere.angle += sphere.orbitSpeed;
            sphere.position.x = Math.cos(sphere.angle) * sphere.orbitRadius;
            sphere.position.y = Math.sin(sphere.angle) * sphere.orbitRadius;
            sphere.rotation.x += 0.02;
            sphere.rotation.y += 0.02;
        });

        // Mouse interaction
        targetRotationX += (mouseY - targetRotationX) * 0.05;
        targetRotationY += (mouseX - targetRotationY) * 0.05;
        scene.rotation.x += (targetRotationX - scene.rotation.x) * 0.05;
        scene.rotation.y += (targetRotationY - scene.rotation.y) * 0.05;

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
