<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Three.js Cosmic Lattice</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
<script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

    // Scene
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.08);

    // Camera
    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.z = 8;

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambient);

    const pointLight = new THREE.PointLight(0x00ffff, 2, 50);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    // Geometry group
    const group = new THREE.Group();
    scene.add(group);

    // Core geometry (icosahedron)
    const coreGeo = new THREE.IcosahedronGeometry(1.5, 1);
    const coreMat = new THREE.MeshStandardMaterial({
      color: 0x1111ff,
      emissive: 0x2200ff,
      metalness: 0.8,
      roughness: 0.2,
      wireframe: false
    });
    const core = new THREE.Mesh(coreGeo, coreMat);
    group.add(core);

    // Wireframe overlay
    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x00ffff,
      wireframe: true
    });
    const wire = new THREE.Mesh(coreGeo, wireMat);
    group.add(wire);

    // Particle system
    const particleCount = 2000;
    const positions = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
      const r = 5 * Math.random();
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);

      positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);
    }

    const particleGeo = new THREE.BufferGeometry();
    particleGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));

    const particleMat = new THREE.PointsMaterial({
      size: 0.03,
      color: 0x00ffff
    });

    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // Orbiting mini spheres
    const orbiters = [];
    for (let i = 0; i < 20; i++) {
      const geo = new THREE.SphereGeometry(0.08, 16, 16);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xff00ff,
        emissive: 0x550055
      });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
      orbiters.push({
        mesh,
        radius: 2 + Math.random() * 2,
        speed: 0.5 + Math.random()
      });
    }

    // Animation
    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      // Rotate core
      group.rotation.x += 0.003;
      group.rotation.y += 0.005;

      // Pulse effect
      const scale = 1 + Math.sin(time * 2) * 0.1;
      group.scale.set(scale, scale, scale);

      // Move particles slightly
      const pos = particleGeo.attributes.position;
      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        pos.array[i3] += Math.sin(time + i) * 0.0005;
        pos.array[i3 + 1] += Math.cos(time + i) * 0.0005;
      }
      pos.needsUpdate = true;

      // Orbiters motion
      orbiters.forEach((o, i) => {
        const angle = time * o.speed + i;
        o.mesh.position.set(
          Math.cos(angle) * o.radius,
          Math.sin(angle * 1.3) * o.radius * 0.5,
          Math.sin(angle) * o.radius
        );
      });

      renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
