<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Synthwave 3D Experience</title>
    <!-- Import Google Fonts for a futuristic look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #00f3ff;
            --secondary-color: #bc13fe;
            --bg-color: #050510;
            --panel-bg: rgba(10, 10, 25, 0.75);
            --text-color: #ffffff;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-body);
            color: var(--text-color);
        }

        /* 3D Canvas */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* UI Overlay Layer */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to canvas where no UI exists */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        /* Header */
        header {
            pointer-events: auto;
            text-shadow: 0 0 10px var(--primary-color);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            opacity: 0.8;
            max-width: 400px;
            line-height: 1.4;
        }

        /* Control Panel */
        aside.controls {
            pointer-events: auto;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 3px solid var(--primary-color);
            padding: 1.5rem;
            border-radius: 4px;
            width: 300px;
            align-self: flex-end;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.3s ease;
        }

        .control-group {
            margin-bottom: 1.2rem;
        }

        .control-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-family: var(--font-display);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--text-color);
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px var(--primary-color);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        /* Buttons */
        .theme-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 8px 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--primary-color);
            color: var(--text-color);
            font-family: var(--font-display);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--primary-color);
            color: #000;
            box-shadow: 0 0 15px var(--primary-color);
        }

        button.active {
            background: var(--primary-color);
            color: #000;
            font-weight: bold;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.8s ease-out;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        .loader-text {
            font-family: var(--font-display);
            letter-spacing: 3px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* Footer / Instructions */
        footer {
            pointer-events: auto;
            font-size: 0.9rem;
            opacity: 0.7;
            text-align: center;
            margin-top: auto;
        }

        .key {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 4px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: monospace;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            aside.controls { width: 100%; border-left: none; border-top: 3px solid var(--primary-color); }
            #ui-layer { padding: 1rem; }
        }
    </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">INITIALIZING SYSTEM...</div>
</div>

<!-- UI Overlay -->
<main id="ui-layer">
    <header>
        <h1>Neon Horizon</h1>
        <p class="subtitle">Procedural terrain generation using Three.js with edge-highlighted geometry.</p>
    </header>

    <footer>
        <p>Interact: Drag to Rotate &bull; Scroll to Zoom</p>
    </footer>

    <aside class="controls">
        <div class="control-group">
            <label for="speed-slider">Flow Speed</label>
            <input type="range" id="speed-slider" min="0" max="2" step="0.1" value="0.5">
        </div>

        <div class="control-group">
            <label>Visual Theme</label>
            <div class="theme-buttons">
                <button class="theme-btn active" data-theme="cyber">Cyber</button>
                <button class="theme-btn" data-theme="sunset">Sunset</button>
                <button class="theme-btn" data-theme="matrix">Matrix</button>
            </div>
        </div>
    </aside>
</main>

<!-- 3D Canvas Container -->
<div id="canvas-container"></div>

<!-- Three.js from CDN -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Configuration ---
    const config = {
        speed: 0.5,
        gridSize: 60,
        gridDivisions: 40,
        colorPalette: {
            cyber: { primary: 0x00f3ff, secondary: 0xbc13fe, bg: 0x050510, fog: 0x050510 },
            sunset: { primary: 0xffaa00, secondary: 0xff0055, bg: 0x220011, fog: 0x220011 },
            matrix: { primary: 0x00ff00, secondary: 0x003300, bg: 0x000500, fog: 0x000500 }
        }
    };

    let currentTheme = 'cyber';

    // --- Scene Setup ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(config.colorPalette[currentTheme].bg);
    scene.fog = new THREE.FogExp2(config.colorPalette[currentTheme].fog, 0.035);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // --- Controls ---
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground
    controls.minDistance = 5;
    controls.maxDistance = 30;

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(config.colorPalette[currentTheme].primary, 2, 50);
    pointLight.position.set(0, 10, 0);
    scene.add(pointLight);

    const spotLight = new THREE.SpotLight(config.colorPalette[currentTheme].secondary, 10);
    spotLight.position.set(10, 20, 10);
    spotLight.angle = 0.5;
    spotLight.penumbra = 1;
    scene.add(spotLight);

    // --- Objects: Terrain (Wireframe Grid) ---
    // Using a PlaneGeometry and manipulating vertices
    const planeGeometry = new THREE.PlaneGeometry(60, 60, 50, 50);
    // Save original positions for wave calculation
    const originalPositions = planeGeometry.attributes.position.array.slice();

    const planeMaterial = new THREE.MeshStandardMaterial({
        color: config.colorPalette[currentTheme].primary,
        wireframe: true,
        roughness: 0.5,
        metalness: 0.8,
        emissive: config.colorPalette[currentTheme].primary,
        emissiveIntensity: 0.2
    });

    const terrain = new THREE.Mesh(planeGeometry, planeMaterial);
    terrain.rotation.x = -Math.PI / 2;
    scene.add(terrain);

    // --- Objects: Floating Crystal with Black Borders ---
    const crystalGeo = new THREE.OctahedronGeometry(1.5, 0);
    const crystalMat = new THREE.MeshPhongMaterial({
        color: config.colorPalette[currentTheme].secondary,
        shininess: 100,
        flatShading: true,
        emissive: config.colorPalette[currentTheme].secondary,
        emissiveIntensity: 0.5
    });
    const crystal = new THREE.Mesh(crystalGeo, crystalMat);
    crystal.position.y = 3;
    scene.add(crystal);

    // --- ADDED: Black Borders ---
    // We use EdgesGeometry to find the hard edges of the geometry
    const edges = new THREE.EdgesGeometry(crystalGeo);
    // Create a black line material
    const lineMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
    // Create the line segments based on edges
    const wireframe = new THREE.LineSegments(edges, lineMat);
    // Scale it slightly up to ensure it sits clearly on top (avoid z-fighting)
    wireframe.scale.set(1.01, 1.01, 1.01);
    // Add as a child of the crystal so they move/rotate together
    crystal.add(wireframe);

    // --- Objects: Star Field ---
    const starGeo = new THREE.BufferGeometry();
    const starCount = 2000;
    const starPos = new Float32Array(starCount * 3);

    for(let i=0; i<starCount * 3; i++) {
        starPos[i] = (Math.random() - 0.5) * 100;
    }

    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.15,
        transparent: true,
        opacity: 0.8
    });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // --- Animation Loop ---
    let time = 0;
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();
        time += delta * config.speed;

        // 1. Animate Terrain (Wave effect)
        const positions = planeGeometry.attributes.position.array;

        for (let i = 0; i < positions.length; i += 3) {
            // Get original X and Y (which corresponds to Z in world space because of rotation)
            const x = originalPositions[i];
            const y = originalPositions[i + 1];

            // Create a moving wave effect
            // z corresponds to the height in the local plane geometry
            const waveX = 0.5 * Math.sin(x * 0.3 + time);
            const waveY = 0.5 * Math.cos(y * 0.2 + time * 0.8);

            positions[i + 2] = waveX + waveY;
        }
        planeGeometry.attributes.position.needsUpdate = true;

        // 2. Animate Crystal (and its borders)
        crystal.rotation.y += delta * 0.5;
        crystal.rotation.z += delta * 0.2;
        crystal.position.y = 3 + Math.sin(time * 2) * 0.5; // Float up and down

        // 3. Animate Stars (slow rotation)
        stars.rotation.y = time * 0.05;

        controls.update();
        renderer.render(scene, camera);
    }

    // --- Event Listeners: Resize ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- UI Interactions ---

    // Remove Loader
    window.onload = () => {
        const loader = document.getElementById('loader');
        loader.style.opacity = '0';
        setTimeout(() => {
            loader.style.display = 'none';
            animate(); // Start animation loop after load
        }, 800);
    };

    // Speed Slider
    const speedSlider = document.getElementById('speed-slider');
    speedSlider.addEventListener('input', (e) => {
        config.speed = parseFloat(e.target.value);
    });

    // Theme Switcher
    const themeButtons = document.querySelectorAll('.theme-btn');

    function applyTheme(themeName) {
        const theme = config.colorPalette[themeName];
        const root = document.documentElement;

        // Update CSS Variables
        root.style.setProperty('--primary-color', '#' + theme.primary.toString(16).padStart(6, '0'));
        root.style.setProperty('--bg-color', '#' + theme.bg.toString(16).padStart(6, '0'));

        // Update Three.js Materials and Lights
        scene.background.setHex(theme.bg);
        scene.fog.color.setHex(theme.fog);

        planeMaterial.color.setHex(theme.primary);
        planeMaterial.emissive.setHex(theme.primary);

        crystalMat.color.setHex(theme.secondary);
        crystalMat.emissive.setHex(theme.secondary);

        pointLight.color.setHex(theme.primary);
        spotLight.color.setHex(theme.secondary);

        // Note: We do NOT change the wireframe color here,
        // keeping the black borders as requested.
    }

    themeButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            // UI Toggle
            themeButtons.forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');

            // Logic
            const themeName = e.target.getAttribute('data-theme');
            currentTheme = themeName;
            applyTheme(themeName);
        });
    });

</script>
</body>
</html>
