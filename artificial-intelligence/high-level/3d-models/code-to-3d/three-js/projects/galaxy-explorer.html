<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Galaxy Scene - Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #0a0e27;
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #00ff88;
            font-family: 'Courier New', monospace;
            max-width: 300px;
            pointer-events: none;
        }
        #info h3 {
            margin-bottom: 10px;
            font-size: 16px;
        }
        #info p {
            margin: 5px 0;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>✦ Galaxy Explorer ✦</h3>
        <p>Move mouse to orbit</p>
        <p>Scroll to zoom</p>
        <p>Watch the particles dance</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e27);
        scene.fog = new THREE.Fog(0x0a0e27, 2, 100);

        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Create stars background
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.1,
            sizeAttenuation: true
        });

        const starsVertices = [];
        for (let i = 0; i < 1000; i++) {
            const x = (Math.random() - 0.5) * 200;
            const y = (Math.random() - 0.5) * 200;
            const z = (Math.random() - 0.5) * 200;
            starsVertices.push(x, y, z);
        }

        starsGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsVertices), 3));
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // Create main galaxy
        const galaxyGeometry = new THREE.BufferGeometry();
        const galaxyCount = 5000;
        
        const positions = new Float32Array(galaxyCount * 3);
        const colors = new Float32Array(galaxyCount * 3);

        for (let i = 0; i < galaxyCount; i++) {
            const i3 = i * 3;
            
            // Spiral galaxy shape
            const radius = Math.random() * 15;
            const spinAngle = radius * 5;
            const branchAngle = (i % 3) * (Math.PI * 2 / 3);
            
            const x = Math.cos(branchAngle + spinAngle) * radius;
            const y = (Math.random() - 0.5) * 2;
            const z = Math.sin(branchAngle + spinAngle) * radius;
            
            positions[i3] = x;
            positions[i3 + 1] = y;
            positions[i3 + 2] = z;
            
            // Color gradient from blue to red
            const colorRatio = radius / 15;
            colors[i3] = 0.2 + colorRatio * 1.0;      // Red channel
            colors[i3 + 1] = 0.5 - colorRatio * 0.3;  // Green channel
            colors[i3 + 2] = 1.0 - colorRatio * 0.8;  // Blue channel
        }

        galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const galaxyMaterial = new THREE.PointsMaterial({
            size: 0.15,
            sizeAttenuation: true,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });

        const galaxy = new THREE.Points(galaxyGeometry, galaxyMaterial);
        scene.add(galaxy);

        // Add some glowing rings
        for (let ring = 0; ring < 3; ring++) {
            const ringGeometry = new THREE.BufferGeometry();
            const ringCount = 100;
            const ringRadius = 5 + ring * 3;
            const ringVertices = [];

            for (let i = 0; i < ringCount; i++) {
                const angle = (i / ringCount) * Math.PI * 2;
                ringVertices.push(
                    Math.cos(angle) * ringRadius,
                    (Math.random() - 0.5) * 0.5,
                    Math.sin(angle) * ringRadius
                );
            }

            ringGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ringVertices), 3));
            const ringMaterial = new THREE.LineBasicMaterial({ 
                color: new THREE.Color().setHSL(0.5 + ring * 0.1, 0.7, 0.5),
                transparent: true,
                opacity: 0.3
            });
            const ring3d = new THREE.Line(ringGeometry, ringMaterial);
            scene.add(ring3d);
        }

        // Camera controls
        let mouse = { x: 0, y: 0 };
        let targetRotation = { x: 0, y: 0 };

        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // Zoom control
        let distance = 30;
        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            distance += e.deltaY * 0.05;
            distance = Math.max(10, Math.min(60, distance));
        }, { passive: false });

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Smooth camera rotation following mouse
            targetRotation.x = mouse.y * 0.5;
            targetRotation.y = mouse.x * 0.5;

            camera.position.x += (Math.sin(targetRotation.y) * distance - camera.position.x) * 0.05;
            camera.position.y += (targetRotation.x * distance - camera.position.y) * 0.05;
            camera.position.z += (Math.cos(targetRotation.y) * distance - camera.position.z) * 0.05;
            
            camera.lookAt(scene.position);

            // Rotate galaxy
            galaxy.rotation.z += 0.0002;
            
            // Animate particles slightly
            const positionAttribute = galaxyGeometry.getAttribute('position');
            const positions = positionAttribute.array;
            
            for (let i = 0; i < positions.length; i += 3) {
                const originalX = positions[i];
                const originalY = positions[i + 1];
                const originalZ = positions[i + 2];
                
                positions[i] += Math.sin(Date.now() * 0.0001 + i) * 0.001;
                positions[i + 1] += Math.cos(Date.now() * 0.00008 + i) * 0.001;
                positions[i + 2] += Math.sin(Date.now() * 0.00012 + i) * 0.001;
            }
            positionAttribute.needsUpdate = true;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
