<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Geometric Dreams</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #050505;
            font-family: 'Courier New', monospace;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .overlay h1 {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .overlay p {
            opacity: 0.7;
            font-size: 12px;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #ff00ff;
            font-size: 12px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
<div id="canvas-container"></div>

<div class="overlay">
    <h1>NEON DREAMS</h1>
    <p>Interactive WebGL Experience</p>
</div>

<div class="controls">
    <p>Move mouse to rotate • Scroll to zoom • Click to pulse</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // Scene setup
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.02);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 30;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0x00ffff, 2, 100);
    pointLight1.position.set(10, 10, 10);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xff00ff, 2, 100);
    pointLight2.position.set(-10, -10, 10);
    scene.add(pointLight2);

    const pointLight3 = new THREE.PointLight(0xffff00, 1.5, 100);
    pointLight3.position.set(0, 0, -10);
    scene.add(pointLight3);

    // Central icosahedron
    const geometry = new THREE.IcosahedronGeometry(5, 0);
    const material = new THREE.MeshPhysicalMaterial({
        color: 0x111111,
        metalness: 0.9,
        roughness: 0.1,
        clearcoat: 1,
        clearcoatRoughness: 0.1,
        emissive: 0x001133,
        emissiveIntensity: 0.2,
        wireframe: false
    });
    const centralMesh = new THREE.Mesh(geometry, material);
    scene.add(centralMesh);

    // Wireframe overlay
    const wireframeMaterial = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        wireframe: true,
        transparent: true,
        opacity: 0.3
    });
    const wireframeMesh = new THREE.Mesh(geometry, wireframeMaterial);
    wireframeMesh.scale.set(1.05, 1.05, 1.05);
    scene.add(wireframeMesh);

    // Orbiting spheres
    const orbitingSpheres = [];
    const sphereCount = 8;

    for (let i = 0; i < sphereCount; i++) {
        const sphereGeometry = new THREE.SphereGeometry(0.5, 16, 16);
        const sphereMaterial = new THREE.MeshPhysicalMaterial({
            color: i % 2 === 0 ? 0xff00ff : 0x00ffff,
            metalness: 0.8,
            roughness: 0.2,
            emissive: i % 2 === 0 ? 0xff00ff : 0x00ffff,
            emissiveIntensity: 0.5
        });
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);

        const angle = (i / sphereCount) * Math.PI * 2;
        const radius = 12;
        sphere.position.set(
            Math.cos(angle) * radius,
            Math.sin(angle) * radius,
            0
        );

        sphere.userData = {
            angle: angle,
            radius: radius,
            speed: 0.5 + Math.random() * 0.5,
            yOffset: Math.random() * Math.PI * 2
        };

        orbitingSpheres.push(sphere);
        scene.add(sphere);
    }

    // Particle system
    const particlesGeometry = new THREE.BufferGeometry();
    const particlesCount = 1000;
    const posArray = new Float32Array(particlesCount * 3);

    for (let i = 0; i < particlesCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 100;
    }

    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

    const particlesMaterial = new THREE.PointsMaterial({
        size: 0.1,
        color: 0xffffff,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
    });

    const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
    scene.add(particlesMesh);

    // Floating geometric shapes
    const floatingShapes = [];
    const shapeTypes = [
        new THREE.TetrahedronGeometry(1),
        new THREE.OctahedronGeometry(1),
        new THREE.BoxGeometry(1, 1, 1)
    ];

    for (let i = 0; i < 15; i++) {
        const shapeGeometry = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
        const shapeMaterial = new THREE.MeshPhysicalMaterial({
            color: Math.random() > 0.5 ? 0xff00ff : 0x00ffff,
            metalness: 0.6,
            roughness: 0.3,
            transparent: true,
            opacity: 0.7
        });
        const shape = new THREE.Mesh(shapeGeometry, shapeMaterial);

        shape.position.set(
            (Math.random() - 0.5) * 50,
            (Math.random() - 0.5) * 50,
            (Math.random() - 0.5) * 30
        );

        shape.userData = {
            rotationSpeed: {
                x: (Math.random() - 0.5) * 0.02,
                y: (Math.random() - 0.5) * 0.02,
                z: (Math.random() - 0.5) * 0.02
            },
            floatSpeed: 0.005 + Math.random() * 0.01,
            floatOffset: Math.random() * Math.PI * 2
        };

        floatingShapes.push(shape);
        scene.add(shape);
    }

    // Mouse interaction
    let mouseX = 0;
    let mouseY = 0;
    let targetRotationX = 0;
    let targetRotationY = 0;

    document.addEventListener('mousemove', (event) => {
        mouseX = (event.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
    });

    // Click to pulse
    let pulseScale = 1;
    document.addEventListener('click', () => {
        pulseScale = 1.5;
    });

    // Scroll to zoom
    let cameraZ = 30;
    document.addEventListener('wheel', (event) => {
        cameraZ += event.deltaY * 0.05;
        cameraZ = Math.max(10, Math.min(60, cameraZ));
    });

    // Window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation loop
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const time = clock.getElapsedTime();
        const delta = clock.getDelta();

        // Rotate central mesh
        centralMesh.rotation.x += 0.005;
        centralMesh.rotation.y += 0.01;

        // Pulse effect
        pulseScale = THREE.MathUtils.lerp(pulseScale, 1, 0.1);
        const scale = 1 + Math.sin(time * 2) * 0.1 * pulseScale;
        centralMesh.scale.set(scale, scale, scale);
        wireframeMesh.scale.set(scale * 1.05, scale * 1.05, scale * 1.05);

        // Update wireframe color
        wireframeMaterial.color.setHSL((time * 0.1) % 1, 1, 0.5);

        // Orbit spheres
        orbitingSpheres.forEach((sphere, index) => {
            const data = sphere.userData;
            const newAngle = data.angle + time * data.speed;
            sphere.position.x = Math.cos(newAngle) * data.radius;
            sphere.position.y = Math.sin(newAngle) * data.radius + Math.sin(time + data.yOffset) * 2;
            sphere.position.z = Math.sin(newAngle * 2) * 5;

            sphere.rotation.x += 0.02;
            sphere.rotation.y += 0.03;
        });

        // Update lights
        pointLight1.position.x = Math.sin(time * 0.5) * 15;
        pointLight1.position.z = Math.cos(time * 0.5) * 15;

        pointLight2.position.x = Math.sin(time * 0.7 + Math.PI) * 15;
        pointLight2.position.y = Math.cos(time * 0.3) * 10;

        // Rotate particles
        particlesMesh.rotation.y = time * 0.05;
        particlesMesh.rotation.x = time * 0.02;

        // Animate floating shapes
        floatingShapes.forEach((shape) => {
            shape.rotation.x += shape.userData.rotationSpeed.x;
            shape.rotation.y += shape.userData.rotationSpeed.y;
            shape.rotation.z += shape.userData.rotationSpeed.z;

            shape.position.y += Math.sin(time + shape.userData.floatOffset) * shape.userData.floatSpeed;
        });

        // Camera movement based on mouse
        targetRotationX = mouseY * 0.5;
        targetRotationY = mouseX * 0.5;

        camera.position.x += (mouseX * 10 - camera.position.x) * 0.05;
        camera.position.y += (mouseY * 10 - camera.position.y) * 0.05;
        camera.position.z += (cameraZ - camera.position.z) * 0.1;
        camera.lookAt(scene.position);

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
