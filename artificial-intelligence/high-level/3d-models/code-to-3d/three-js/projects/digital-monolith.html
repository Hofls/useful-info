<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Digital Monolith</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // 1. Scene Setup
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // 2. Objects
    // Create a central Octahedron (the "Monolith")
    const geometry = new THREE.OctahedronGeometry(1, 0);
    const material = new THREE.MeshPhongMaterial({
        color: 0x00ffcc,
        wireframe: true,
        emissive: 0x004433
    });
    const monolith = new THREE.Mesh(geometry, material);
    scene.add(monolith);

    // Add a floor grid for perspective
    const gridHelper = new THREE.GridHelper(20, 40, 0xff00ff, 0x222222);
    gridHelper.position.y = -2;
    scene.add(gridHelper);

    // 3. Lighting
    const light = new THREE.PointLight(0xffffff, 50, 100);
    light.position.set(5, 5, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040)); // Soft white light

    camera.position.z = 5;
    camera.position.y = 1;

    // 4. Animation Loop
    function animate() {
        requestAnimationFrame(animate);

        // Rotate the monolith
        monolith.rotation.x += 0.01;
        monolith.rotation.y += 0.01;

        // Subtle floating motion
        monolith.position.y = Math.sin(Date.now() * 0.002) * 0.2;

        // Rotate the camera slowly around the scene
        const time = Date.now() * 0.0005;
        camera.position.x = Math.cos(time) * 5;
        camera.position.z = Math.sin(time) * 5;
        camera.lookAt(scene.position);

        renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
